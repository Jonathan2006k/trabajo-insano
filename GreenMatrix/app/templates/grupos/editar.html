{% extends "base.html" %}

{% block title %}Editar Grupo - Sistema Escolar{% endblock %}
{% block page_title %}Editar Grupo{% endblock %}

{% block content %}
<div class="container-fluid page-compact">
    <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
            <div class="card">
                <div class="card-header bg-light border-bottom">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-pencil-square"></i> Editar Grupo
                    </h5>
                </div>
                <div class="card-body">
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show">
                            <i class="bi bi-exclamation-circle"></i> {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('grupos.editar', grupo_id=grupo.id) }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nombre" class="form-label">Nombre del Grupo *</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" value="{{ grupo.nombre }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="semestre" class="form-label">Semestre *</label>
                                <select class="form-select" id="semestre" name="semestre" required>
                                    <option value="1" {% if grupo.semestre == 1 %}selected{% endif %}>1º Semestre</option>
                                    <option value="2" {% if grupo.semestre == 2 %}selected{% endif %}>2º Semestre</option>
                                    <option value="3" {% if grupo.semestre == 3 %}selected{% endif %}>3º Semestre</option>
                                    <option value="4" {% if grupo.semestre == 4 %}selected{% endif %}>4º Semestre</option>
                                    <option value="5" {% if grupo.semestre == 5 %}selected{% endif %}>5º Semestre</option>
                                    <option value="6" {% if grupo.semestre == 6 %}selected{% endif %}>6º Semestre</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="aula" class="form-label">Aula</label>
                                <input type="text" class="form-control" id="aula" name="aula" value="{{ grupo.aula or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="turno_id" class="form-label">Turno *</label>
                                <select class="form-select" id="turno_id" name="turno_id" required>
                                    {% for turno in turnos %}
                                        <option value="{{ turno.id }}" {% if grupo.turno_id == turno.id %}selected{% endif %}>{{ turno.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('grupos.detalle', grupo_id=grupo.id) }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
