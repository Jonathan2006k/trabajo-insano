{% extends "base.html" %}

{% block title %}Editar Planeación - Sistema Escolar{% endblock %}
{% block page_title %}Editar Planeación{% endblock %}

{% block content %}
<div class="container-fluid page-compact">
    <div class="row">
        <div class="col-lg-9 col-md-11 mx-auto">
            <div class="card">
                <div class="card-header bg-light border-bottom">
                    <h5 class="card-title mb-0"><i class="bi bi-pencil-square"></i> Editar Planeación</h5>
                </div>
                <div class="card-body">
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show">
                            <i class="bi bi-exclamation-circle"></i> {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('planeacion.editar', planeacion_id=planeacion.id) }}">
                        {% include "planeacion/form.html" %}
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
