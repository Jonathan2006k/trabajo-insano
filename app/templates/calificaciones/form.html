<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% if calificacion %}Editar{% else %}Nueva{% endif %} Calificación</title>
</head>
<body>
  <h1>{% if calificacion %}Editar{% else %}Nueva{% endif %} Calificación</h1>

  <form method="post">
    <label>Alumno</label>
    <select name="alumno_id" required>
      <option value="">-- Seleccione --</option>
      {% for a in alumnos %}
        <option value="{{ a.id }}" {% if calificacion and calificacion.alumno_id==a.id %}selected{% endif %}>{{ a.apellido }}, {{ a.nombre }} ({{ a.matricula }})</option>
      {% endfor %}
    </select>

    <label>Planeación (opcional)</label>
    <select name="planeacion_id">
      <option value="">-- Ninguna --</option>
      {% for p in planeaciones %}
        <option value="{{ p.id }}" {% if calificacion and calificacion.planeacion_id==p.id %}selected{% endif %}>{{ p.id }} - Grupo {{ p.grupo_id }} - Materia {{ p.materia_id }}</option>
      {% endfor %}
    </select>

    <label>Valor</label>
    <input name="valor" type="number" step="0.01" value="{{ calificacion.valor if calificacion else '' }}" required>

    <label>Tipo</label>
    <select name="tipo">
      <option value="Parcial" {% if calificacion and calificacion.tipo=='Parcial' %}selected{% endif %}>Parcial</option>
      <option value="Final" {% if calificacion and calificacion.tipo=='Final' %}selected{% endif %}>Final</option>
      <option value="Tarea" {% if calificacion and calificacion.tipo=='Tarea' %}selected{% endif %}>Tarea</option>
      <option value="Participacion" {% if calificacion and calificacion.tipo=='Participacion' %}selected{% endif %}>Participación</option>
    </select>

    <label>Fecha</label>
    <input name="fecha" type="date" value="{{ calificacion.fecha if calificacion and calificacion.fecha }}">

    <label>Comentarios</label>
    <textarea name="comentarios">{{ calificacion.comentarios if calificacion else '' }}</textarea>

    <button type="submit">Guardar</button>
  </form>

  <p><a href="{{ url_for('calificaciones.index') }}">Volver a lista</a></p>
</body>
</html>
